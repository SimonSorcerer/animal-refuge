services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: wildlife
      POSTGRES_PASSWORD: wildlife
      POSTGRES_DB: wildlife_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wildlife -d wildlife_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
